x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "3"

services:
  postgres:
    image: postgres:18.3-alpine
    platform: linux/arm64/v8
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - type: volume
        source: dispo_
        target: /var/lib/postgresql
      - type: bind
        source: ./backend/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
        read_only: true
    networks:
      - dispo
    ports:
      - "5432:5432"
    logging: *logging
    restart: unless-stopped

  nestjs:
    platform: linux/arm64/v8
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - dispo
      - caddy
    logging: *logging
    restart: unless-stopped

  svelte:
    platform: linux/arm64/v8
    build:
      context: ./frontend
    environment:
      ORIGIN: ${PUBLIC_BASE_URL}
      PORT: 3001
    env_file:
      - .env
    networks:
      - dispo
      - caddy
    logging: *logging
    restart: unless-stopped

volumes:
  dispo_:
    name: dispo_data

networks:
  dispo:
  caddy:
    external: true

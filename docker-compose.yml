services:
  postgres:
    image: postgres:18.3-alpine
    platform: linux/arm64/v8
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - type: volume
        source: dispo_
        target: /var/lib/postgresql
      - type: bind
        source: ./back/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
        read_only: true
    networks:
      - dispo
    restart: unless-stopped

  nestjs:
    platform: linux/arm64/v8
    build:
      context: ./back
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - dispo
      - caddy
    restart: unless-stopped

  svelte:
    platform: linux/arm64/v8
    build:
      context: ./front
    environment:
      ORIGIN: ${PUBLIC_BASE_URL}
      PORT: 3001
    ports:
      - "3001:3001"
    env_file:
      - .env
    networks:
      - dispo
      - caddy
    restart: unless-stopped

volumes:
  dispo_:
    name: dispo_data

networks:
  dispo:
  caddy:
    external: true

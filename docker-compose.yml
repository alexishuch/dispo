services:
  dispo_postgres:
    image: postgres:18.3-alpine
    platform: linux/arm64/v8
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - type: volume
        source: dispo_
        target: /var/lib/postgresql
      - type: bind
        source: ./back/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
        read_only: true
    restart: unless-stopped

  dispo_nestjs:
    platform: linux/arm64/v8
    build:
      context: ./back
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    depends_on:
      - dispo_postgres
    restart: unless-stopped

  dispo_svelte:
    platform: linux/arm64/v8
    build:
      context: ./front
    environment:
      ORIGIN: "${PUBLIC_BASE_URL}:3001"
      PORT: 3001
    ports:
      - "3001:3001"
    env_file:
      - .env
    restart: unless-stopped

volumes:
  dispo_:
    name: dispo_data

networks:
  dispo: